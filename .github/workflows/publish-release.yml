name: Publish Release

on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true
      SLACK_WEBHOOK_URL:
        required: true
      PUBLISH_DOCS_TOKEN:
        required: true
      INFURA_API_KEY:
        required: false

jobs:
  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v1
        with:
          is-high-risk-environment: true
      - uses: MetaMask/action-publish-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: yarn build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: publish-release-artifacts-${{ github.sha }}
          include-hidden-files: true
          retention-days: 4
          path: |
            ./packages/**/dist
            ./playground/**/dist
            ./node_modules/.yarn-state.yml

  publish-npm-dry-run:
    name: Dry run publish to NPM
    runs-on: ubuntu-latest
    needs: publish-release
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v1
        with:
          is-high-risk-environment: true
          ref: ${{ github.sha }}
      - name: Restore build artifacts
        uses: actions/download-artifact@v4
        with:
          name: publish-release-artifacts-${{ github.sha }}
      - name: Dry run publish to NPM
        uses: MetaMask/action-npm-publish@v5
        with:
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          subteam: S042S7RE4AE # @metamask-npm-publishers

  publish-npm:
    name: Publish to NPM
    environment: npm-publish
    runs-on: ubuntu-latest
    needs: publish-npm-dry-run
    steps:
      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v1
        with:
          is-high-risk-environment: true
          ref: ${{ github.sha }}
      - name: Restore build artifacts
        uses: actions/download-artifact@v4
        with:
          name: publish-release-artifacts-${{ github.sha }}
      - name: Publish to NPM
        uses: MetaMask/action-npm-publish@v5
        with:
          npm-token: ${{ secrets.NPM_TOKEN }}

  get-release-version:
    needs: publish-npm
    runs-on: ubuntu-latest
    outputs:
      RELEASE_VERSION: ${{ steps.get-release-version.outputs.RELEASE_VERSION }}
      RELEASE_TAG: ${{ steps.get-release-version.outputs.RELEASE_TAG }}
      RN_PLAYGROUND_RELEASED: ${{ steps.check-rn-playground.outputs.RELEASED }}
      RN_PLAYGROUND_TAG: ${{ steps.check-rn-playground.outputs.PLAYGROUND_TAG }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - id: get-release-version
        shell: bash
        run: |
          # Read the released root package version directly so Pages paths track
          # the monorepo release rather than whichever workspace tag git sees last.
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_OUTPUT"
      - id: check-rn-playground
        shell: bash
        run: |
          PKG_NAME=$(node -p "require('./playground/react-native-playground/package.json').name")
          PKG_VERSION=$(node -p "require('./playground/react-native-playground/package.json').version")
          PLAYGROUND_TAG="${PKG_NAME}@${PKG_VERSION}"
          echo "PLAYGROUND_TAG=$PLAYGROUND_TAG" >> "$GITHUB_OUTPUT"

          # Detect a release by comparing the playground version against the
          # parent commit. The RN playground is `"private": true` (so it is
          # never npm-published), and our release tooling only tags
          # non-private workspaces. We therefore can't rely on a per-package
          # tag existing on the release commit the way we can for other
          # workspaces — see build-rn-playground-apk.yml, which creates the
          # tag itself when uploading the APK.
          if git cat-file -e "${{ github.sha }}^:playground/react-native-playground/package.json" 2>/dev/null; then
            git show "${{ github.sha }}^:playground/react-native-playground/package.json" > /tmp/prev-rn-pkg.json
            PREV_VERSION=$(node -p "require('/tmp/prev-rn-pkg.json').version")
          else
            PREV_VERSION=""
          fi

          # Also skip if a tag for this version already exists. `git revert` of
          # a release commit produces a "Revert ..." message that the
          # IS_RELEASE filter (main.yml) rejects, so reverts never reach this
          # step directly. But a release that re-uses a previously-tagged
          # version (e.g., a re-release after a revert, or a workflow re-run)
          # would otherwise rebuild the APK and fail when uploading to an
          # existing release asset.
          if [ -n "$PREV_VERSION" ] && [ "$PREV_VERSION" != "$PKG_VERSION" ]; then
            if git rev-parse "refs/tags/$PLAYGROUND_TAG" >/dev/null 2>&1; then
              echo "RELEASED=false" >> "$GITHUB_OUTPUT"
              echo "$PLAYGROUND_TAG already exists in git — skipping APK build"
            else
              echo "RELEASED=true" >> "$GITHUB_OUTPUT"
              echo "$PKG_NAME bumped $PREV_VERSION -> $PKG_VERSION in ${{ github.sha }} — will build APK"
            fi
          else
            echo "RELEASED=false" >> "$GITHUB_OUTPUT"
            echo "$PKG_NAME version unchanged at $PKG_VERSION — skipping APK build"
          fi

  publish-wagmi-to-gh-pages:
    name: Publish Wagmi Integration to `wagmi/${{ needs.get-release-version.outputs.RELEASE_VERSION }}` directory of `gh-pages` branch
    needs: get-release-version
    permissions:
      contents: write
    uses: ./.github/workflows/deploy-wagmi-to-gh-pages.yml
    with:
      destination_dir: wagmi/${{ needs.get-release-version.outputs.RELEASE_VERSION }}
    secrets:
      PUBLISH_DOCS_TOKEN: ${{ secrets.PUBLISH_DOCS_TOKEN }}

  publish-wagmi-to-latest-gh-pages:
    name: Publish Wagmi Integration to `wagmi/latest` directory of `gh-pages` branch
    needs: publish-wagmi-to-gh-pages
    permissions:
      contents: write
    uses: ./.github/workflows/deploy-wagmi-to-gh-pages.yml
    with:
      destination_dir: wagmi/latest
    secrets:
      PUBLISH_DOCS_TOKEN: ${{ secrets.PUBLISH_DOCS_TOKEN }}

  publish-browser-playground-to-gh-pages:
    name: Publish Browser Playground to `${{ needs.get-release-version.outputs.RELEASE_VERSION }}` directory of `gh-pages` branch
    needs: get-release-version
    permissions:
      contents: write
    uses: ./.github/workflows/deploy-browser-playground-to-gh-pages.yml
    with:
      destination_dir: ${{ needs.get-release-version.outputs.RELEASE_VERSION }}
    secrets:
      PUBLISH_DOCS_TOKEN: ${{ secrets.PUBLISH_DOCS_TOKEN }}

  publish-browser-playground-to-latest-gh-pages:
    name: Publish Browser Playground to `latest` directory of `gh-pages` branch
    needs: publish-browser-playground-to-gh-pages
    permissions:
      contents: write
    uses: ./.github/workflows/deploy-browser-playground-to-gh-pages.yml
    with:
      destination_dir: latest
    secrets:
      PUBLISH_DOCS_TOKEN: ${{ secrets.PUBLISH_DOCS_TOKEN }}

  build-rn-playground-apk:
    name: Build and publish RN Playground APK
    needs: get-release-version
    if: needs.get-release-version.outputs.RN_PLAYGROUND_RELEASED == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/build-rn-playground-apk.yml
    with:
      release_tag: ${{ needs.get-release-version.outputs.RN_PLAYGROUND_TAG }}
      upload_to_release: true
    secrets:
      INFURA_API_KEY: ${{ secrets.INFURA_API_KEY }}
